{% if error %}
<div class="err-banner">&#9888;&nbsp; {{ error }}</div>
{% endif %}

<div class="card">
    <div class="card-title">Query</div>
    <form method="get" action="/report">
        <div class="form-row">
            <div class="fg">
                <label>Language</label>
                <select name="lang">
                    {% for code, label in lang_options %}
                    <option value="{{ code }}" {% if code == lang %}selected{% endif %}>{{ label }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="fg">
                <label>City Name</label>
                <input type="text" name="city" value="{{ city }}"
                       placeholder="e.g. Tel Aviv - City Center" required
                       list="city-suggestions" autocomplete="off">
                <datalist id="city-suggestions"></datalist>
            </div>
            <div class="fg">
                <label>From</label>
                <input type="date" name="from_date" value="{{ from_val }}" required>
            </div>
            <div class="fg">
                <label>To</label>
                <input type="date" name="to_date" value="{{ to_val }}" required>
            </div>
            <div class="form-btns">
                <button type="submit" class="btn">Generate</button>
                <button type="submit" formaction="/raw-data" formtarget="_blank"
                        class="btn btn-outline">View Raw Data</button>
            </div>
        </div>
    </form>
</div>

<script>
(function () {
    var langSel = document.querySelector('select[name="lang"]');
    var datalist = document.getElementById('city-suggestions');
    if (!datalist) return;

    function loadDistricts(lang) {
        fetch('/api/districts?lang=' + encodeURIComponent(lang))
            .then(function (r) { return r.json(); })
            .then(function (data) {
                datalist.innerHTML = '';
                data.forEach(function (item) {
                    var val = typeof item === 'string' ? item : (item.label || '');
                    if (val) {
                        var opt = document.createElement('option');
                        opt.value = val;
                        datalist.appendChild(opt);
                    }
                });
            })
            .catch(function () {});
    }

    loadDistricts(langSel ? langSel.value : 'he');

    if (langSel) {
        langSel.addEventListener('change', function () {
            loadDistricts(langSel.value);
        });
    }
}());
</script>
